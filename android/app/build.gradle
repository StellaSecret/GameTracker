plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode") ?: "1"
def flutterVersionName = localProperties.getProperty("flutter.versionName") ?: "1.0"

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.stellasecret.gametracker"
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    // AGP 9.3.0's bundled Lint crashes with a NoSuchMethodError on
    // List.removeLast() inside CommentDetector — a lint-tooling bug, not
    // an issue in this app's code — while scanning source comments during
    // the automatic lintVital* check AGP runs before every release build.
    // CommentDetector is exactly what implements the EasterEgg/StopShip
    // checks (it scans comments for STOPSHIP markers and joke
    // annotations), so disabling those two specific checks avoids
    // invoking the broken detector for THIS module (:app). It does NOT
    // reach other subprojects' own lintVital tasks (e.g.
    // :url_launcher_android's), each of which has its own independent
    // android{} block we can't edit — see android/build.gradle (project
    // level, not this file) for the project-wide fix that actually
    // covers those too. Revisit both once upstream fixes this in AGP.
    lint {
        disable "EasterEgg", "StopShip"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

    buildFeatures {
        resValues true
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
    }

    defaultConfig {
        applicationId "com.stellasecret.gametracker"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true

        resValue "string", "google_client_id", project.findProperty("GOOGLE_CLIENT_ID") ?: ""

        // AdMob App ID for AndroidManifest.xml's ${admobApplicationId}
        // placeholder (see manifestPlaceholders below). Sourced the same
        // way as GOOGLE_CLIENT_ID above: a Gradle project property, which
        // CI sets via an ORG_GRADLE_PROJECT_ADMOB_APPLICATION_ID_ANDROID
        // env var backed by a GitHub secret (see .github/workflows/build.yml
        // and SETUP.md). Falls back to Google's public test App ID when
        // that property isn't set (e.g. local builds without the secret) —
        // this MUST stay paired with whatever ad unit ID ad_service.dart's
        // ADMOB_REWARDED_AD_UNIT_ANDROID resolves to for the same build,
        // or requests fail with ERROR_CODE_INVALID_REQUEST.
        //
        // IMPORTANT: use .put(), not `manifestPlaceholders = [...]`. The
        // Flutter Gradle plugin already populates this same map with its
        // own entries (notably "applicationName", which resolves the
        // ${applicationName} placeholder on Flutter's own <application>
        // tag) before this build file runs. A plain `=` assignment here
        // replaces the whole map rather than adding to it, silently wiping
        // out "applicationName" and breaking the manifest merge with
        // "no value for <applicationName> is provided" — .put() adds this
        // one key without touching what's already there.
        manifestPlaceholders.put(
            "admobApplicationId",
            project.findProperty("ADMOB_APPLICATION_ID_ANDROID")
                ?: "ca-app-pub-3940256099942544~3347511713"
        )
    }

    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                keyAlias keystoreProperties["keyAlias"]
                keyPassword keystoreProperties["keyPassword"]
                storeFile keystoreProperties["storeFile"] ? file(keystoreProperties["storeFile"]) : null
                storePassword keystoreProperties["storePassword"]
            }
        }
    }

    buildTypes {
        debug {
            // Pas de suffix pour rester compatible avec google-services.json
        }
        release {
            signingConfig keystorePropertiesFile.exists()
                ? signingConfigs.release
                : signingConfigs.debug
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}

flutter {
    source "../.."
}

dependencies {
    implementation "androidx.multidex:multidex:2.0.1"
}
