name: game_tracker
description: Track your board game scores with Google Drive sync.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  gap: ^3.0.1

  # State management
  provider: ^6.1.2

  # Local storage
  shared_preferences: ^2.2.3
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Google Drive / Auth
  google_sign_in: ^6.2.1
  googleapis: ^13.2.0
  http: ^1.2.1
  extension_google_sign_in_as_googleapis_auth: ^2.0.12

  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0
  collection: ^1.18.0

  # Web only
  url_launcher: ^6.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
