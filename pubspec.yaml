name: game_tracker
description: Track your board game scores — solo, with friends, or in real-time groups.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^8.2.0
  flutter_animate: ^4.5.0
  gap: ^3.0.1

  # State management
  provider: ^6.1.2

  # Local storage
  shared_preferences: ^2.2.3
  path: ^1.9.0

  # Google Drive / Auth (backup gratuit)
  google_sign_in: ^7.2.0
  google_sign_in_platform_interface: ^3.1.0
  googleapis: ^16.0.0
  http: ^1.2.1
  extension_google_sign_in_as_googleapis_auth: ^3.0.0

  # Firebase / Firestore (sync temps réel premium)
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.7.1

  # In-app purchases (freemium)
  purchases_flutter: ^10.4.1

  # Ads (rewarded — stats temporary unlock for free users)
  google_mobile_ads: ^9.0.0

  # Utils
  uuid: ^4.4.0
  intl: ^0.20.2
  collection: ^1.18.0

  # Web only
  url_launcher: ^6.2.6
  universal_html: ^2.3.0
  google_sign_in_web: ^1.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter

flutter:
  generate: true
  uses-material-design: true

  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Regular.ttf
          weight: 400
        - asset: assets/fonts/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700
