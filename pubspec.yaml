name: game_tracker
description: Track your board game scores — solo, with friends, or in real-time groups.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  gap: ^3.0.1

  # State management
  provider: ^6.1.2

  # Local storage
  shared_preferences: ^2.2.3
  path: ^1.9.0

  # Google Drive / Auth (backup gratuit)
  google_sign_in: ^6.2.1
  googleapis: ^13.2.0
  http: ^1.2.1
  extension_google_sign_in_as_googleapis_auth: ^2.0.12

  # Firebase / Firestore (sync temps réel premium)
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1

  # In-app purchases (freemium)
  purchases_flutter: ^8.0.0

  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0
  collection: ^1.18.0

  # Web only
  url_launcher: ^6.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
