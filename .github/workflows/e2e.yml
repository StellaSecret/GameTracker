name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel any in-progress run on the same branch to save minutes.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-android:
    name: E2E – Android Emulator
    # macos runners have hardware acceleration (HAXM/KVM) which makes
    # the emulator ~10× faster than ubuntu for nested virtualisation.
    runs-on: macos-14

    steps:
      # ── Checkout ────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Java (required by the Android SDK tools) ─────────────────────────
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── Flutter ───────────────────────────────────────────────────────────
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # ── Android SDK & emulator ────────────────────────────────────────────
      - name: Install Android SDK components
        uses: android-actions/setup-android@v3

      - name: Install emulator & system image
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-34" \
            "emulator" \
            "system-images;android-34;google_apis;x86_64"

      - name: Create AVD
        run: |
          echo no | avdmanager create avd \
            --name gt_e2e \
            --package "system-images;android-34;google_apis;x86_64" \
            --device "pixel_6" \
            --force

      # ── Firebase stub: provide a minimal google-services.json so the ──────
      # ── build doesn't fail (AppState.init() wraps Firebase in try/catch) ──
      - name: Create stub google-services.json
        run: |
          cat > android/app/google-services.json << 'JSON'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id":     "game-tracker-stub",
              "storage_bucket": "game-tracker-stub.appspot.com"
            },
            "client": [{
              "client_info": {
                "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                "android_client_info": { "package_name": "com.example.game_tracker" }
              },
              "oauth_client":  [],
              "api_key":       [{ "current_key": "stub" }],
              "services":      { "appinvite_service": { "other_platform_oauth_client": [] } }
            }],
            "configuration_version": "1"
          }
          JSON

      # ── Run the emulator & tests in parallel ──────────────────────────────
      - name: Start emulator and run E2E tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          avd-name: gt_e2e
          # Disable animations so pumpAndSettle() converges reliably.
          disable-animations: true
          # flutter test picks up integration_test/ automatically.
          script: |
            flutter test integration_test/app_test.dart \
              --no-pub \
              --reporter expanded

      # ── Upload test artefacts on failure ──────────────────────────────────
      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-${{ github.run_number }}
          path: |
            build/integration_test/
            /tmp/*.png
          retention-days: 7
