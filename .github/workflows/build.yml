name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─── Job 1 : Build ────────────────────────────────────────────────────────
  build:
    name: 🤖 Build Android + Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test --no-pub

      - name: Analyze
        run: flutter analyze --no-fatal-infos || true

      # ── Keystore ────────────────────────────────────────────────────────────
      - name: Decode keystore
        if: ${{ github.event_name != 'pull_request' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
          cat > android/key.properties << PROPS
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=keystore.jks
          PROPS

      - name: Set versionCode
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          sed -i "s/versionCode .*/versionCode ${{ github.run_number }}/" android/app/build.gradle
          echo "versionCode → ${{ github.run_number }}"

      # ── APK arm64 seulement (sideload / tests) ──────────────────────────────
      - name: Build APK arm64-v8a release
        if: ${{ github.event_name != 'pull_request' }}
        run: flutter build apk --release --target-platform android-arm64

      # ── AAB universel (Play Store) ──────────────────────────────────────────
      - name: Build AAB release
        if: ${{ github.event_name != 'pull_request' }}
        run: flutter build appbundle --release

      # ── Debug APK (PR et branches) ──────────────────────────────────────────
      - name: Build debug APK
        if: ${{ github.event_name == 'pull_request' }}
        run: flutter build apk --debug

      # ── Collect artifacts ───────────────────────────────────────────────────
      - name: Collect artifacts
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
             dist/gametracker-${{ github.run_number }}-arm64.apk
          cp build/app/outputs/bundle/release/app-release.aab \
             dist/gametracker-${{ github.run_number }}.aab

      - name: Upload debug APK
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/upload-artifact@v4
        with:
          name: GameTracker-debug-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

      - name: Upload release artifacts
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@v4
        with:
          name: GameTracker-release-${{ github.run_number }}
          path: dist/
          retention-days: 1

  # ─── Job 2 : Release GitHub ───────────────────────────────────────────────
  release:
    name: 🚀 Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name != 'pull_request' }}
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: GameTracker-release-${{ github.run_number }}
          path: dist/

      - name: List artifacts
        run: ls -la dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "GameTracker build #${{ github.run_number }}"
          body: |
            Build #${{ github.run_number }} — commit `${{ github.sha }}`

            ### Installation directe (Android)
            📱 **gametracker-${{ github.run_number }}-arm64.apk** → appareils récents arm64 (2015+)

            > Active *Sources inconnues* dans les paramètres Android, puis lance l'APK.

            ### Play Store
            📦 **gametracker-${{ github.run_number }}.aab** → à uploader dans la Google Play Console
          files: |
            dist/gametracker-${{ github.run_number }}-arm64.apk
            dist/gametracker-${{ github.run_number }}.aab
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Job 3 : Deploy Web (GitHub Pages) ───────────────────────────────────
  deploy-web:
    name: 🌐 Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --base-href "/GameTracker/" --release

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
