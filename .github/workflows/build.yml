name: CI/CD GameTracker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  security-events: write
  actions: read

jobs:
  # ── SÉCURITÉ 1 : SCAN DE SECRETS (TRUFFLEHOG) ──────────
  scan-secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
          head: ${{ github.sha }}
          extra_args: --only-verified

  # ── SÉCURITÉ 2 : ANALYSE STATIQUE (CODEQL) ─────────────
  codeql-analysis:
    name: CodeQL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript # Flutter utilise JS pour le web, CodeQL couvre cette partie
      - name: Perform Analysis
        uses: github/codeql-action/analyze@v3

  # ── SÉCURITÉ 3 : AUDIT FLUTTER & PLACEHOLDERS ──────────
  flutter-security:
    name: Flutter Lint & Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Get Dependencies
        run: flutter pub get
      - name: Verify No Secrets in Code
        run: |
          if grep -q "AIzaSy" web/index.html; then
            echo "❌ Google API Key détectée dans l'index !" && exit 1
          fi
      - name: Flutter Analyze
        run: flutter analyze --no-fatal-infos

  # ── BUILD GLOBAL (Android + Web) ───────────────────────
  build:
    name: Build Android & Web
    needs: [scan-secrets, codeql-analysis, flutter-security]
    runs-on: ubuntu-latest
    outputs:
      artifact-release-name: GameTracker-release-${{ github.run_number }}
      artifact-web-name: GameTracker-web-${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      # Phase Secrets & Config
      - name: Prepare Signing & Firebase
        if: github.event_name != 'pull_request'
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
          cat > android/key.properties << PROPS
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=keystore.jks
          PROPS
          sed -i "s/versionCode .*/versionCode ${{ github.run_number }}/" android/app/build.gradle

      # Build Android
      - name: Build Android (APK & AAB)
        if: github.event_name != 'pull_request'
        run: |
          flutter build apk --release --target-platform android-arm64 --dart-define=PREMIUM_EMAILS=${{ secrets.PREMIUM_EMAILS }}
          flutter build appbundle --release --dart-define=PREMIUM_EMAILS=${{ secrets.PREMIUM_EMAILS }}

      - name: Build Debug APK (PR)
        if: github.event_name == 'pull_request'
        run: flutter build apk --debug

      # Build Web
      - name: Build Web
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          sed -i 's|%%GOOGLE_WEB_CLIENT_ID%%|${{ secrets.GOOGLE_WEB_CLIENT_ID }}|g' web/index.html
          flutter build web --base-href "/GameTracker/" --release --dart-define=PREMIUM_EMAILS=${{ secrets.PREMIUM_EMAILS }}

      # Archivage
      - name: Collect Android Artifacts
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/gametracker-${{ github.run_number }}-arm64.apk
          cp build/app/outputs/bundle/release/app-release.aab dist/gametracker-${{ github.run_number }}.aab
          [ -f build/app/outputs/mapping/release/mapping.txt ] && cp build/app/outputs/mapping/release/mapping.txt dist/mapping-${{ github.run_number }}.txt || true

      - name: Upload Release Artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: GameTracker-release-${{ github.run_number }}
          path: dist/
          retention-days: 1

      - name: Upload Web Artifacts
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: GameTracker-web-${{ github.run_number }}
          path: build/web/
          retention-days: 1

  # ── DÉPLOIEMENT WEB (Pages) ────────────────────────────
  deploy-web:
    name: Deploy Web
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact-web-name }}
          path: build/web/
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  # ── RELEASE GITHUB ─────────────────────────────────────
  release:
    name: Create Release
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact-release-name }}
          path: dist/
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "GameTracker build #${{ github.run_number }}"
          body: "Build #${{ github.run_number }} — Qualité validée."
          files: |
            dist/*.apk
            dist/*.aab
            dist/*.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
