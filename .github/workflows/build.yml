name: CI/CD GameTracker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  security-events: write
  actions: read
  pages: write
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── PARALLEL SECURITY JOBS ────────────────────────────
  scan-secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
          head: ${{ github.sha }}
          extra_args: --only-verified

  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript
      - name: Perform Analysis
        uses: github/codeql-action/analyze@v4

  flutter-audit:
    name: Flutter Audit & Placeholders
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Get Dependencies
        run: flutter pub get
      - name: Verify No Secrets in Code
        run: |
          if grep -q "AIzaSy" web/index.html; then
            echo "❌ Google API Key détectée dans l'index !" && exit 1
          fi
      - name: Flutter Analyze
        run: flutter analyze --no-fatal-infos

  # ── PARALLEL TEST JOBS ────────────────────────────────
  unit-tests:
    name: Flutter Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Get Dependencies
        run: flutter pub get
      - name: Run Tests
        run: flutter test --no-pub --reporter=expanded
      - name: Test Coverage
        if: github.event_name == 'pull_request'
        run: |
          flutter test --no-pub --coverage
          if command -v lcov &> /dev/null; then
            lcov --summary coverage/lcov.info
          else
            echo "lcov not available, skipping summary"
          fi
      - name: Upload Coverage Report
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-${{ github.run_number }}
          path: coverage/lcov.info
          retention-days: 7

  e2e-android:
    name: E2E – Android Emulator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'pubspec.lock') }}
          restore-keys: gradle-${{ runner.os }}-
      - name: Cache Android SDK system image
        uses: actions/cache@v5
        with:
          path: /usr/local/lib/android/sdk/system-images
          key: android-sdk-image-30-google_atd-x86_64
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Create stub google-services.json
        run: |
          cat > android/app/google-services.json << 'JSON'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id":     "game-tracker-stub",
              "storage_bucket": "game-tracker-stub.appspot.com"
            },
            "client": [{
              "client_info": {
                "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                "android_client_info": { "package_name": "com.stellasecret.gametracker" }
              },
              "oauth_client":  [],
              "api_key":       [{ "current_key": "stub" }],
              "services":      { "appinvite_service": { "other_platform_oauth_client": [] } }
            }],
            "configuration_version": "1"
          }
          JSON
      - name: Run E2E tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_atd
          arch: x86_64
          profile: pixel_6
          avd-name: gt_e2e
          disable-animations: true
          cores: 2
          ram-size: 2048M
          heap-size: 256M
          disk-size: 4096M
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          script: |
            flutter test integration_test/app_test.dart --no-pub --reporter expanded -d emulator-5554
      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-failure-${{ github.run_number }}
          path: |
            build/integration_test/
            /tmp/*.png
          retention-days: 7

  # ── SEQUENTIAL DEPLOYMENT JOBS ───────────────────────
  deploy-web:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: [unit-tests, e2e-android]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Get dependencies
        run: flutter pub get
      - name: Build Web
        run: |
          sed -i 's|%%GOOGLE_WEB_CLIENT_ID%%|${{ secrets.GOOGLE_WEB_CLIENT_ID }}|g' web/index.html
          flutter build web --base-href "/GameTracker/" --release --dart-define=PREMIUM_EMAILS=${{ secrets.PREMIUM_EMAILS }}
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/web
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5

  build-android:
    name: Build Android
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    needs: [scan-secrets, codeql-analysis, flutter-audit, unit-tests, e2e-android]
    runs-on: ubuntu-latest
    outputs:
      artifact-name: GameTracker-release-${{ github.run_number }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Get dependencies
        run: flutter pub get
      - name: Prepare Signing & Firebase
        if: github.event_name != 'pull_request'
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
          cat > android/key.properties << PROPS
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=keystore.jks
          PROPS
          sed -i "s/versionCode .*/versionCode ${{ github.run_number }}/" android/app/build.gradle
      - name: Build Android (APK & AAB)
        if: github.event_name != 'pull_request'
        run: |
          flutter build apk --release --target-platform android-arm64 --dart-define=PREMIUM_EMAILS=${{ secrets.PREMIUM_EMAILS }}
          flutter build appbundle --release --dart-define=PREMIUM_EMAILS=${{ secrets.PREMIUM_EMAILS }}
      - name: Build Debug APK (PR)
        if: github.event_name == 'pull_request'
        run: flutter build apk --debug
      - name: Collect Android Artifacts
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/gametracker-${{ github.run_number }}-arm64.apk
          cp build/app/outputs/bundle/release/app-release.aab dist/gametracker-${{ github.run_number }}.aab
          [ -f build/app/outputs/mapping/release/mapping.txt ] && cp build/app/outputs/mapping/release/mapping.txt dist/mapping-${{ github.run_number }}.txt || true
      - name: Upload Release Artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: GameTracker-release-${{ github.run_number }}
          path: dist/
          retention-days: 7

  release:
    name: Create Release
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build-android
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: GameTracker-release-${{ github.run_number }}
          path: dist/
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: build-${{ github.run_number }}
          name: "GameTracker build #${{ github.run_number }}"
          body: "Build #${{ github.run_number }} — Qualité validée."
          files: |
            dist/*.apk
            dist/*.aab
            dist/*.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
