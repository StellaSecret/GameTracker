<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="GameTracker — Suivez vos scores de jeux de société">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="GameTracker">
  <meta name="theme-color" content="#0F0F1A">

  <!-- Open Graph / Social Media -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://stellasecret.github.io/GameTracker/">
  <meta property="og:title" content="GameTracker — Dominez vos jeux de société">
  <meta property="og:description" content="Scores en temps réel, statistiques avancées, groupes privés. Ne perdez plus jamais une partie.">
  <meta property="og:image" content="https://stellasecret.github.io/GameTracker/icons/Icon-512.png">
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:title" content="GameTracker — Dominez vos jeux de société">
  <meta property="twitter:description" content="Scores en temps réel, statistiques avancées, groupes privés.">

  <title>GameTracker 🎲</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #0F0F1A;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Outfit', 'Segoe UI', system-ui, sans-serif;
      color: #F0F0FF;
    }
    #loading {
      text-align: center;
      animation: fadeIn 0.5s ease;
    }
    #loading .emoji {
      font-size: 56px;
      margin-bottom: 16px;
      animation: bounce 1.2s infinite ease-in-out;
    }
    #loading h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    #loading p {
      font-size: 14px;
      color: #9999BB;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="emoji">🎲</div>
    <h1>GameTracker</h1>
    <p>Chargement…</p>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      document.getElementById('loading').style.display = 'none';
    });

    // Shim for Google Identity Services to force redirect mode on GitHub Pages
    (function() {
      const checkGis = setInterval(() => {
        if (window.google && window.google.accounts && window.google.accounts.id) {
          clearInterval(checkGis);
          const originalInit = window.google.accounts.id.initialize;
          window.google.accounts.id.initialize = function(config) {
            console.log("GameTracker: Patching GIS configuration for GitHub Pages...");
            const patchedConfig = Object.assign({}, config, {
              ux_mode: 'redirect',
              auto_select: false,          // Disable auto-sign-in to avoid background COOP checks
              use_fedcm_for_prompt: false, // Disable FedCM to avoid browser-level COOP checks
              login_uri: window.location.origin + window.location.pathname,
            });
            originalInit(patchedConfig);
          };
        }
      }, 50);
    })();
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
